name: DevSecOps Full Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # STAGE 1: Στατικοί έλεγχοι (Κώδικας & YAML)
  static-security:
    name: Static Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Semgrep SAST
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep \
          semgrep scan --config auto --sarif --output semgrep.sarif
        continue-on-error: true

      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true

      - name: Upload Static Results to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

  # STAGE 2: Build και Image Scanning
  build-and-scan:
    name: Build and Image Scan
    needs: static-security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-image

  # STAGE 3: Δυναμικός έλεγχος (DAST)
  dast-scan:
    name: DAST Scan (OWASP ZAP)
    needs: build-and-scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start App Container
        run: |
          docker build -t test-app .
          docker run -d -p 8080:80 --name webapp test-app
          sleep 10 # Δίνουμε χρόνο στο Nginx να ξεκινήσει

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:8080'
          # Παράγουμε HTML report και SARIF για το Security Tab
          cmd_options: '-a -r report.html -S' 

      - name: Upload ZAP HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report.html

      - name: Upload ZAP SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'zap_out.sarif'
          category: owasp-zap

      - name: Stop App
        run: docker stop webapp