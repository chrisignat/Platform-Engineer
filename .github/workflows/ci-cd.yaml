name: Secure CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Απαραίτητο για να κάνει το commit στο τέλος
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. BUILD ΤΟ IMAGE ΤΟΠΙΚΑ (Χωρίς push ακόμα)
      - name: Build Docker Image Locally
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true # Το φορτώνει τοπικά στον runner για να το σκανάρει
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:test

      # 2. SECURITY SCAN (Trivy)
      # Αν βρει "HIGH" ή "CRITICAL" vulnerabilities, το workflow θα αποτύχει εδώ!
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:test'
          format: 'table'
          exit-code: '1' # Αν βρει κενά, σταματάει το pipeline (error)
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 3. PUSH ΤΟ IMAGE (Μόνο αν το scan πέρασε)
      - name: Push Docker Image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:latest

      # 4. UPDATE K8S MANIFEST (Μόνο αν όλα είναι οκ)
      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:latest|g" nginx.yaml
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add nginx.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update image to latest [skip ci]"
            git push
          fi
          git commit -m "chore: security-scan passed, updating image"
          git push