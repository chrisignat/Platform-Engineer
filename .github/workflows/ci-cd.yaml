name: DevSecOps Comprehensive Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Security & IaC Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Semgrep: Σαρώνει όλο το repo για ευπάθειες κώδικα
      - name: Semgrep SAST
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep \
          semgrep scan --config auto --sarif --output semgrep.sarif
        continue-on-error: true

      # 2. Checkov: Σαρώνει όλα τα YAML αρχεία σε όλους τους φακέλους
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: . # Η τελεία σημαίνει "ξεκίνα από την ρίζα και ψάξε παντού"
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true

      # 3. Trivy: Σαρώνει το Filesystem για Misconfigurations (YAML/Dockerfile)
      - name: Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          directory: '.' # Σαρώνει όλο το repo αναδρομικά
          format: 'sarif'
          output: 'trivy-config.sarif'
        continue-on-error: true

      # 4. Ανέβασμα όλων των αποτελεσμάτων στο Security Tab
      - name: Upload Security Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: . # Μαζεύει όλα τα .sarif αρχεία αυτόματα

  build-and-deploy:
    name: Build & Image Security
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build το image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }} .

      # 5. Trivy: Σαρώνει το Image για CVEs (Ευπάθειες σε πακέτα)
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Image Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # Login & Push
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }} ./apps/base

      # GitOps Update (για το ArgoCD)
      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}|g" apps/base/nginx.yaml
          
      - name: Commit and Push
        run: |
          git config --global user.email "devsecops-bot@example.com"
          git config --global user.name "DevSecOps Bot"
          git add apps/base/nginx.yaml
          git commit -m "chore: update image to ${{ github.sha }} [skip ci]"
          git push