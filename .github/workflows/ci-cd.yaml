name: DevSecOps Unified Security Scan

on:
  push:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Απαραίτητο για να γράφει στο Security Tab
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Semgrep Scan -> SARIF
      - name: Semgrep SAST
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep \
          semgrep scan --config auto --sarif --output semgrep.sarif
        continue-on-error: true # Συνεχίζουμε για να ανέβουν τα αποτελέσματα

      # 2. Checkov Scan -> SARIF
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true

      # 3. Trivy Scan (για το Dockerfile & Dependencies) -> SARIF
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          security-checks: 'vuln,config'
          format: 'sarif'
          output: 'trivy.sarif'
          exit-code: '0'

      # 4. UPLOAD ALL TO GITHUB SECURITY TAB
      # Εδώ μαζεύουμε όλα τα αποτελέσματα σε ένα σημείο
      - name: Upload Semgrep Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy