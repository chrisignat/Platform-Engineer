name: CI to Docker Hub

on:
  push:
    branches: [ "main" ] # Τρέχει κάθε φορά που κάνεις push στη main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: . # Εδώ υποθέτουμε ότι έχεις ένα Dockerfile στον κεντρικό φάκελο
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:latest
          
# ... (τα προηγούμενα steps του build-and-push)

      - name: Update Kubernetes Manifest
        run: |
          # Εδώ χρησιμοποιούμε το 'sed' για να αλλάξουμε το image tag στο deployment αρχείο σου
          # Αντικατάστησε το 'nginx-deployment.yaml' με το δικό σου αρχείο
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:latest|g" k8s/nginx-deployment.yaml
          
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/nginx-deployment.yaml
          git commit -m "chore: update image to latest"
          git push          
