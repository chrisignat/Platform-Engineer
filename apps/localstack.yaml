apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack-aws
  namespace: argocd
spec:
  project: default
  source:
    chart: localstack
    repoURL: https://localstack.github.io/helm-charts
    targetRevision: 0.6.14
    helm:
      values: |
        image:
          # Χρησιμοποιούμε το απλό image, όχι το pro
          repository: localstack/localstack
          tag: latest
        
        extraEnvVars:
          - name: SERVICES
            value: "s3,sqs,lambda,sns,dynamodb,iam,apigateway"
          - name: ACTIVATE_PRO
            value: "0"
          - name: DEBUG
            value: "1"
          - name: LAMBDA_EXECUTOR
            value: "local"
        
        # Απενεργοποιούμε το Docker mount για να μην έχουμε permissions errors
        mountDind:
          enabled: false

        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"

        persistence:
          enabled: true
          size: 5Gi
        
        service:
          type: ClusterIP

  destination:
    server: https://kubernetes.default.svc
    namespace: localstack

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true