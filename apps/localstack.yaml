apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack-aws
  namespace: argocd
spec:
  project: default
  source:
    chart: localstack
    repoURL: https://localstack.github.io/helm-charts
    targetRevision: 0.6.14
    helm:
      values: |
        image:
          repository: localstack/localstack
          tag: latest
        
        extraEnvVars:
          - name: LOCALSTACK_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: localstack-secrets
                key: auth-token
          - name: SERVICES
            value: "s3,sqs,lambda,rds,sns,dynamodb,iam"
          - name: DEBUG
            value: "1"
          - name: LAMBDA_EXECUTOR
            value: "local"

        # Resources - Το Pro με RDS θέλει RAM!
        resources:
          requests:
            cpu: "200m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

        persistence:
          enabled: true
          size: 5Gi
        
        service:
          type: ClusterIP

  destination:
    server: https://kubernetes.default.svc
    namespace: localstack

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true