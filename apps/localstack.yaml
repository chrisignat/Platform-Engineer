apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack-aws
  namespace: argocd
spec:
  project: default
  source:
    chart: localstack
    repoURL: https://localstack.github.io/helm-charts
    targetRevision: 0.6.14
    helm:
      values: |
        image:
          tag: latest
        extraEnvVars:
          - name: SERVICES
            value: "s3,sqs,lambda,rds,sns"
          - name: DEBUG
            value: "1"
        persistence:
          enabled: true
          size: 5Gi
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: localstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true