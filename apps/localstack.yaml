apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack-aws
  namespace: argocd
spec:
  project: default
  source:
    chart: localstack
    repoURL: https://localstack.github.io/helm-charts
    targetRevision: 0.6.14
    helm:
      values: |
        image:
          tag: latest
        extraEnvVars:
          - name: LOCALSTACK_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: localstack-secrets
                key: auth-token
          - name: SERVICES
            value: "s3,sqs,lambda,sns,dynamodb"
          - name: DEBUG
            value: "1"
          - name: LAMBDA_EXECUTOR
            value: "docker" # Το Pro προτιμάει docker executor
          - name: DOCKER_HOST
            value: "unix:///var/run/docker.sock"

        # Ενεργοποιούμε το Docker-in-Docker για να βλέπει το socket
        mountDind:
          enabled: true

        resources:
          requests:
            cpu: "200m"
            memory: "1Gi" # Αυξήθηκε γιατί το RDS + Pro είναι βαριά
          limits:
            cpu: "1000m"
            memory: "2Gi"

        persistence:
          enabled: true
          size: 5Gi
        
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: localstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true