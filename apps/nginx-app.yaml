apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-nginx-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chrisignat/Platform-Engineer.git  # <-- Βάλε το repo σου!
    targetRevision: main
    path: apps/base # Επειδή τα nginx.yaml / kustomization.yaml είναι στον κεντρικό φάκελο
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true