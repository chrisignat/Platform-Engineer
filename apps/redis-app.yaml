apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-redis-db
  namespace: argocd
spec:
  project: default
  source:
    chart: redis
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 18.x.x
    # --- ΠΡΟΣΘΕΣΕ ΑΥΤΟ ΤΟ ΤΜΗΜΑ ---
    helm:
      values: |
        image:
          tag: 7.2.4-debian-12
    # ------------------------------
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true