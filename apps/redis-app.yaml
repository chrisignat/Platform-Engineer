apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-redis-db
  namespace: argocd
spec:
  project: default
  source:
    chart: redis
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 18.19.4
    helm:
      values: |
        image:
          registry: docker.io
          repository: bitnami/redis
          tag: latest
        # --- ΠΡΟΣΘΕΣΕ ΤΑ ΠΑΡΑΚΑΤΩ ---
        master:
          persistence:
            enabled: true
            size: 2Gi
            storageClass: "standard" # Σε K3d/Docker Desktop βάλε "local-path" αν το "standard" αποτύχει
        replica:
          replicaCount: 3           # Για High Availability
          persistence:
            enabled: true
            size: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true