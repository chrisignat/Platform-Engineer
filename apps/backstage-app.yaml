apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    chart: backstage
    repoURL: https://backstage.github.io/charts
    targetRevision: "*"
    helm:
      skipSchemaValidation: true
      values: |
        backstage:
          image:
            registry: ghcr.io
            repository: roadiehq/backstage-showcase
            tag: latest
          extraEnvVars:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: GITHUB_TOKEN

        global:
          imagePullSecrets:
            - name: ghcr-pull-secret