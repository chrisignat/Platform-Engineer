apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    # ΠΡΟΣΟΧΗ: Το νέο repoURL και chart name
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.15.0  # Χρησιμοποίησε μια σύγχρονη έκδοση (π.χ. 2.15.x)
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system # Συνήθως εγκαθίσταται εδώ
  syncPolicy:
    automated:
      prune: true
      selfHeal: true