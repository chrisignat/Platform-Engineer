apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-to-redis-only
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: nginx 
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: redis 
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP 
      port: 53