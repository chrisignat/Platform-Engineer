apiVersion: v1
kind: ServiceAccount
metadata:
  name: junior-dev-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader        # <--- Πρέπει να είναι ΑΚΡΙΒΩΣ το ίδιο
  namespace: default      # <--- Πρέπει να είναι το ΙΔΙΟ namespace
rules:
- apiGroups: [""]
  resources: ["pods", "services", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: junior-dev-sa
  namespace: default
roleRef:
  kind: Role
  name: pod-reader        # <--- Εδώ το Binding "δένει" με τον παραπάνω Role
  apiGroup: rbac.authorization.k8s.io