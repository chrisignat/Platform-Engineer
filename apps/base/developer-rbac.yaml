apiVersion: v1
kind: ServiceAccount
metadata:
  name: junior-dev-sa
  namespace: apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader       
  namespace: apps      
rules:
- apiGroups: [""]
  resources: ["pods", "services", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods-binding
  namespace: apps
subjects:
- kind: ServiceAccount
  name: junior-dev-sa
  namespace: apps
roleRef:
  kind: Role
  name: pod-reader        
  apiGroup: rbac.authorization.k8s.io