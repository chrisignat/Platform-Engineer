apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: provision-any-s3-
spec:
  entrypoint: main
  

  hostAliases:
    - ip: "192.168.1.3" 
      hostnames:
        - "localstack.local"

  arguments:
    parameters:
      - name: name
        value: "my-custom-bucket-name" 
  templates:
    - name: main
      dag:
        tasks:
          - name: create-s3
            templateRef:
              name: infra-s3-factory
              template: provision-s3
            arguments:
              parameters:
                - name: bucket_name
                  value: "{{workflow.parameters.name}}"