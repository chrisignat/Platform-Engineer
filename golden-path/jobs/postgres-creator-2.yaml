apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: postgres-full-pipeline-
spec:
  entrypoint: main-pipeline
  hostAliases:
  - ip: "192.168.1.3" # Η IP του υπολογιστή σου όπου τρέχει το LocalStack
    hostnames:
    - "localstack.local"
  
  arguments:
    parameters:
    - name: target-namespace
      value: "postgres-prod"
    - name: postgres-version
      value: "15.0"

  templates:
  - name: main-pipeline
    dag:
      tasks:
      # --- ΦΑΣΗ 1: ΑΣΦΑΛΕΙΑ ---
      - name: security-scan
        template: trivy-scan
        arguments:
          parameters: [{name: version, value: "{{workflow.parameters.postgres-version}}"}]

      # --- ΦΑΣΗ 2: ΠΡΟΕΤΟΙΜΑΣΙΑ (Περιμένει το Scan αλλά προχωράει πάντα) ---
      - name: create-ns
        dependencies: [security-scan]
        template: namespace-manager
        arguments:
          parameters: [{name: namespace, value: "{{workflow.parameters.target-namespace}}"}]

      - name: gen-creds
        dependencies: [security-scan]
        template: credential-gen

      # --- ΦΑΣΗ 3: DEPLOYMENT ---
      - name: deploy-postgresql
        dependencies: [create-ns, gen-creds]
        template: k8s-deployment
        arguments:
          parameters: 
          - name: db-password
            value: "{{tasks.gen-creds.outputs.parameters.db-password}}"
          - name: namespace
            value: "{{workflow.parameters.target-namespace}}"

      - name: deploy-service
        dependencies: [deploy-postgresql]
        template: k8s-service
        arguments:
          parameters: 
          - name: namespace
            value: "{{workflow.parameters.target-namespace}}"

      - name: deploy-hpa
        dependencies: [deploy-postgresql]
        template: k8s-hpa
        arguments:
          parameters: 
          - name: namespace
            value: "{{workflow.parameters.target-namespace}}"

      - name: get-svc-ip
        dependencies: [deploy-service]
        template: fetch-service-ip
        arguments:
          parameters: [{name: namespace, value: "{{workflow.parameters.target-namespace}}"}]

      # --- ΦΑΣΗ 4: ΑΝΑΦΟΡΑ ---
      - name: build-pdf
        dependencies: [get-svc-ip, gen-creds]
        template: pdf-generator
        arguments:
          parameters:
          - name: db-password
            value: "{{tasks.gen-creds.outputs.parameters.db-password}}"
          - name: service-ip
            value: "{{tasks.get-svc-ip.outputs.parameters.svc-ip}}"
          - name: scan-data
            value: "{{tasks.security-scan.outputs.parameters.scan-report}}"
          - name: namespace
            value: "{{workflow.parameters.target-namespace}}"

  # --- Templates ---

  - name: trivy-scan
    inputs:
      parameters: [{name: version}]
    container:
      image: aquasec/trivy:latest
      command: ["sh", "-c"]
      args: 
        - |
          apk add --no-cache jq
          # Αφαιρέθηκε το --exit-code 1. Το Trivy θα σκανάρει, θα βρει τα issues, αλλά ΔΕΝ θα σταματήσει το workflow.
          trivy image --severity CRITICAL --quiet --format json postgres:{{inputs.parameters.version}} | \
          jq -r '.Results[0].Vulnerabilities[0:15] | .[] | "\(.VulnerabilityID) | \(.PkgName) | \(.InstalledVersion)"' > /tmp/scan.txt || true
          cat /tmp/scan.txt
    outputs:
      parameters:
      - name: scan-report
        valueFrom: {path: /tmp/scan.txt}

  - name: namespace-manager
    inputs:
      parameters: [{name: namespace}]
    resource:
      action: apply
      manifest: |
        apiVersion: v1
        kind: Namespace
        metadata:
          name: "{{inputs.parameters.namespace}}"

  - name: credential-gen
    container:
      image: alpine:latest
      command: ["sh", "-c"]
      args: ["echo $(tr -dc a-A-z-Z-0-9 < /dev/urandom | head -c 12) > /tmp/pass.txt"]
    outputs:
      parameters:
      - name: db-password
        valueFrom: {path: /tmp/pass.txt}

  - name: k8s-deployment
    inputs:
      parameters: [{name: db-password}, {name: namespace}]
    resource:
      action: apply
      manifest: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: postgres-deploy
          namespace: {{inputs.parameters.namespace}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: postgres
          template:
            metadata:
              labels:
                app: postgres
            spec:
              containers:
              - name: postgres
                image: postgres:15.0
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                env:
                - name: POSTGRES_PASSWORD
                  value: "{{inputs.parameters.db-password}}"

  - name: k8s-service
    inputs:
      parameters: [{name: namespace}]
    resource:
      action: apply
      manifest: |
        apiVersion: v1
        kind: Service
        metadata:
          name: postgres-svc
          namespace: {{inputs.parameters.namespace}}
        spec:
          type: NodePort
          selector:
            app: postgres
          ports:
          - protocol: TCP
            port: 5432
            targetPort: 5432
            nodePort: 30432

  - name: k8s-hpa
    inputs:
      parameters: [{name: namespace}]
    resource:
      action: apply
      manifest: |
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        metadata:
          name: postgres-hpa
          namespace: {{inputs.parameters.namespace}}
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: postgres-deploy
          minReplicas: 1
          maxReplicas: 5
          metrics:
          - type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 70

  - name: fetch-service-ip
    inputs:
      parameters: [{name: namespace}]
    container:
      image: bitnami/kubectl:latest
      command: ["sh", "-c"]
      args: ["SVC_IP=$(kubectl get svc postgres-svc -n {{inputs.parameters.namespace}} -o jsonpath='{.spec.clusterIP}') && echo -n $SVC_IP > /tmp/svc_ip.txt"]
    outputs:
      parameters:
      - name: svc-ip
        valueFrom: {path: /tmp/svc_ip.txt}

  - name: pdf-generator
    inputs:
      parameters:
      - name: db-password
      - name: service-ip
      - name: scan-data
      - name: namespace
    container:
      image: python:3.9-slim
      command: ["/bin/bash", "-c"]
      args:
        - |
          pip install fpdf2
          export SCAN_DATA="{{inputs.parameters.scan-data}}"
          python3 - <<EOF
          from fpdf import FPDF
          import os
          
          monthly_cost = (0.25 * 0.0316 + 0.5 * 0.0042) * 24 * 30
          clean_scan = os.getenv('SCAN_DATA', 'No Critical Issues Found')

          pdf = FPDF()
          pdf.add_page()
          pdf.set_font("helvetica", 'B', 16)
          pdf.cell(0, 10, 'Security & Provisioning Report', align='C', new_x="LMARGIN", new_y="NEXT")
          pdf.ln(5)
          
          pdf.set_font("helvetica", 'B', 12)
          pdf.cell(0, 10, "1. Infrastructure Details", new_x="LMARGIN", new_y="NEXT")
          pdf.set_font("helvetica", size=11)
          pdf.cell(0, 8, f"Namespace: {{inputs.parameters.namespace}}", new_x="LMARGIN", new_y="NEXT")
          pdf.cell(0, 8, f"Stable IP (Service): {{inputs.parameters.service-ip}}", new_x="LMARGIN", new_y="NEXT")
          
          pdf.ln(3)
          pdf.set_font("helvetica", 'B', 12)
          pdf.cell(0, 10, "2. Security & Cost", new_x="LMARGIN", new_y="NEXT")
          pdf.set_font("helvetica", size=11)
          pdf.set_text_color(255, 0, 0)
          pdf.cell(0, 8, f"Database Password: {{inputs.parameters.db-password}}", new_x="LMARGIN", new_y="NEXT")
          pdf.set_text_color(0, 128, 0)
          pdf.cell(0, 8, f"Est. Monthly Cost (24/7): \${monthly_cost:.2f}", new_x="LMARGIN", new_y="NEXT")
          
          pdf.set_text_color(0, 0, 0)
          pdf.ln(5)
          pdf.set_font("helvetica", 'B', 12)
          pdf.cell(0, 10, "3. Top Critical Vulnerabilities (Ignored for now):", new_x="LMARGIN", new_y="NEXT")
          pdf.set_font("courier", size=9)
          pdf.multi_cell(0, 6, clean_scan)
          
          pdf.output("/tmp/pro-report.pdf")
          EOF
    outputs:
      artifacts:
      - name: provisioning-pdf
        path: /tmp/pro-report.pdf
        archive:
          none: {}
        s3:
          endpoint: localstack.local
          bucket: velero-backups
          key: "reports/{{workflow.name}}/pro-report.pdf"
          insecure: true
          forcePathStyle: true
          accessKeySecret:
            name: my-s3-credentials
            key: accessKey
          secretKeySecret:
            name: my-s3-credentials
            key: secretKey