apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows-setup
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chrisignat/Platform-Engineer
    targetRevision: HEAD
    path: infrastructure/argo-workflows 
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true