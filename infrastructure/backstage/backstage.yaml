apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    chart: backstage
    repoURL: https://backstage.github.io/charts
    targetRevision: 1.0.0
    helm:
      skipSchemaValidation: true
      values: |
        backstage:
          image:
            registry: docker.io
            repository: nxcreed/my-backstage
            tag: v13
          
          appConfig:
            app:
              title: "Internal Developer Portal"
              baseUrl: http://backstage.local
            
            backend:
              baseUrl: http://backstage.local
              cors:
                origin: http://backstage.local
                methods: [GET, POST, PUT, DELETE, OPTIONS]
                allowedHeaders: [Content-Type, Authorization, Cookie]
                credentials: true
              auth:
                keys:
                  - secret: ${BACKEND_SECRET}

            auth:
              environment: development
              providers:
                guest:
                  dangerouslyAllowQuietGuestAllowList: [ 'guest' ]
                github:
                  development:
                    clientId: ${GITHUB_CLIENT_ID}
                    clientSecret: ${GITHUB_CLIENT_SECRET}
            
            signInPage: guest 

          extraEnvVars:
            - name: BACKEND_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: BACKEND_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-secrets
                  key: token
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-password

  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true