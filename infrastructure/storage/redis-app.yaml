apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-redis-db
  namespace: argocd
spec:
  project: default
  source:
    chart: redis
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 18.19.4
    helm:
      values: |
        image:
          registry: docker.io
          repository: bitnami/redis
          tag: latest
        
        master:
          persistence:
            enabled: true
            size: 2Gi
            storageClass: "standard"
        replica:
          replicaCount: 3           
          persistence:
            enabled: true
            size: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
