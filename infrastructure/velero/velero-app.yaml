apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    chart: velero
    repoURL: https://vmware-tanzu.github.io/helm-charts
    targetRevision: 6.0.0
    helm:
      values: |
        upgradeCRDs: false
        cleanUpCRDs: false
        
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero-backups
              config:
                region: us-east-1
                s3ForcePathStyle: true
                s3Url: http://localstack-aws.localstack.svc.cluster.local:4566
          volumeSnapshotLocation:
            - name: default
              provider: aws
              config:
                region: us-east-1
        
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.9.0
            volumeMounts:
              - mountPath: /target
                name: plugins

        # ΣΩΣΤΟ ΚΛΕΙΔΙ ΓΙΑ ΤΟ HELM CHART v6.0.0
        extraContainers:
          - name: velero-ui
            image: ghcr.io/otwld/velero-ui:latest
            ports:
              - containerPort: 8080
            env:
              - name: VELERO_SERVER_ADDRESS
                value: "localhost:9087"

        credentials:
          secretContents:
            cloud: |
              [default]
              aws_access_key_id = test
              aws_secret_access_key = test
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true