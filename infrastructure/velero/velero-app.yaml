apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    chart: velero
    repoURL: https://vmware-tanzu.github.io/helm-charts
    targetRevision: 6.0.0
    helm:
      values: |
        # --- ΠΡΟΣΘΗΚΗ: Διόρθωση για το ImagePullBackOff του kubectl ---
        kubectl:
          image:
            repository: rancher/kubectl
            tag: v1.30.3
        # --------------------------------------------------------------

        configuration:
          # Χρήση λίστας για συμβατότητα με Velero Chart v6+
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero-backups
              config:
                region: us-east-1
                s3ForcePathStyle: true
                s3Url: http://localstack-aws.localstack.svc.local:4566
          
          volumeSnapshotLocation:
            - name: default
              provider: aws
              config:
                region: us-east-1
        
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.9.0
            volumeMounts:
              - mountPath: /plugins
                name: plugins

        credentials:
          secretContents:
            cloud: |
              [default]
              aws_access_key_id = test
              aws_secret_access_key = test

        # Ενεργοποίηση του Web UI
        ui:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true