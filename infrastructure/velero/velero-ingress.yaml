apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velero-ui-ingress
  namespace: velero
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: velero.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: velero-server
            port:
              number: 80