apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velero-ui-ingress
  namespace: velero
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
  - host: velero.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: velero
            port:
              number: 8080 # Στοχεύουμε πλέον την 8080 του UI