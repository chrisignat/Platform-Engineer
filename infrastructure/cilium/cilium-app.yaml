apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    chart: cilium
    repoURL: https://helm.cilium.io/
    targetRevision: 1.15.4
    helm:
      values: |
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: tru
        ipam:
          mode: kubernetes
        nodeinit:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system