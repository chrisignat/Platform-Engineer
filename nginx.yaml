apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nxcreed/my-nginx-app:48ad72a890ae2de2c4387a4cd95f815687f6b33c
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "200m"      # Αυτό χρειάζεται το HPA (0.1 CPU core)
            memory: "64Mi"
          limits:
            cpu: "400m"      # Το ταβάνι του Pod
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
